version: 2

models:
  - name: fct_transactions_001_transactions
    description: >
      One row per transaction_id with user/segment context and high-amount flags.
      Transactions: if duplicate transaction_id exists in staging, keep latest by transaction_ts.
      Users: if duplicate user_id exists in staging, keep one row (latest customer_since) so joins do not fan out.
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null

  - name: mrt_transactions_001_agg_transactions_daily
    description: "Daily transaction metrics by segment, state, and transaction type."
    columns:
      - name: activity_date
        tests:
          - not_null

  - name: mrt_transactions_001_agg_transactions_by_user
    description: "Lifetime and last-30-day spend per user."
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

